services:
  api1:
    image: srpatos/rinha-2026-bun:latest
    hostname: api1
    environment:
      PORT: "8080"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    image: srpatos/rinha-2026-bun:latest
    hostname: api2
    environment:
      PORT: "8080"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

networks:
  default:
    driver: bridge
